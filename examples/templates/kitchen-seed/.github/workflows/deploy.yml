# Literal "deploy on the cook's push" path for the kitchen storefront.
#
# HONEST BOUNDARY: this workflow is INERT without Cloudflare credentials. It is config present,
# never exercised in the vend repo. The cook (on their own repo/fork) sets the repo secrets
# CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID; then every push to main builds the Astro
# Worker output and deploys it to Cloudflare. No live deploy happens here.
name: Deploy to Cloudflare

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # The @astrojs/cloudflare adapter emits a Worker; deploy reads dist/server/wrangler.json.
          command: deploy
          workingDirectory: dist/server
